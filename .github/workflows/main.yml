# .github/workflows/main.yml
    name: Build APK

    on:
      push:
        branches: [ "main" ] # Ändere ggf. zu deinem Standard-Branch
      pull_request:
        branches: [ "main" ]

    jobs:
      build:
        runs-on: ubuntu-latest

        steps:
        - uses: actions/checkout@v3

        - name: Install Flutter
          uses: subosito/flutter-action@v2
          with:
            flutter-version: '3.x' # Oder eine spezifische Version
            channel: 'stable'

        - name: Get dependencies
          run: flutter pub get

        # Optional: Führe Tests aus
        # - name: Run tests
        #   run: flutter test

        - name: Build APK (Release)
          run: flutter build apk --release

        - name: Upload APK
          uses: actions/upload-artifact@v4
          with:
            name: release-apk
            path: build/app/outputs/flutter-apk/app-release.apk # Pfad zur generierten APK
